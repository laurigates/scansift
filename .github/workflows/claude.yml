name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    uses: laurigates/.github/.github/workflows/reusable-claude.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      plugin_marketplaces: |
        https://github.com/laurigates/claude-plugins.git
      plugins: |
        git-plugin@laurigates-claude-plugins
        typescript-plugin@laurigates-claude-plugins
        testing-plugin@laurigates-claude-plugins
        code-quality-plugin@laurigates-claude-plugins
        container-plugin@laurigates-claude-plugins
        github-actions-plugin@laurigates-claude-plugins
